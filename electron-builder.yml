appId: studio.rehoarder.app
productName: ReHoarder
copyright: Copyright (c) 2026 Ares9323

# Override the package.json `description` for the bundled app: electron-builder
# feeds the in-bundle description into the Win32 `FileDescription` resource via
# rcedit, and Windows Task Manager renders that as the per-process name. Without
# this the long marketing string from package.json ends up on the row label.
extraMetadata:
  description: ReHoarder

directories:
  buildResources: resources
  output: release/${version}

files:
  - 'out/**/*'
  - 'package.json'
  - '!**/.DS_Store'
  - '!**/Thumbs.db'

asarUnpack:
  - '**/*.node'

extraResources:
  - from: resources/presets
    to: presets
    filter:
      - '**/*'

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ReHoarder-${version}-setup-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
    - deb
  category: Development
  artifactName: ReHoarder-${version}-${arch}.${ext}

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ReHoarder-${version}-${arch}.${ext}
